      reason: Route Apple TV+ domains through the Apple TV policy group.
    - id: v2fly_dlc_apple
      type: geosite
      target: APPLE
      reason: Route Apple service domains through the Apple policy group.
    - id: v2fly_dlc_microsoft
      type: geosite
      target: MICROSOFT
      reason: Route Microsoft service domains through the Microsoft policy group.
    - id: v2fly_dlc_googlefcm
