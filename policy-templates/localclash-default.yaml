    - id: v2fly_dlc_category_ecommerce
      type: geosite
      target: ECOMMERCE
      reason: Route ecommerce categories through the ecommerce policy group.
    - id: v2fly_dlc_geolocation__cn
      type: geosite
      target: proxy
      reason: Route non-China geolocation domains through the default proxy group instead of the non-v2fly gfw tag.
    - id: v2fly_dlc_cn
      type: geosite
