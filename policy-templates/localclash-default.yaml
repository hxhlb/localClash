id: localclash-default
name: localClash Default
description: Aethersailor-like default policy using v2fly-dlc GEOSITE packs for common categories.
default: true
config:
  version: 1
  policy_template: localclash-default
  proxy_groups:
    CHATGPT:
      mode: auto
      match:
        type: name_regex
        pattern: .*
        min: 1
      reason: Route OpenAI domains through an independent policy group.
      boundary: template_all_subscription_nodes
    AI:
      mode: auto
      match:
        type: name_regex
        pattern: .*
        min: 1
      reason: Route non-China AI service categories through an independent policy group.
      boundary: template_all_subscription_nodes
    GITHUB:
      mode: auto
      match:
        type: name_regex
        pattern: .*
        min: 1
      reason: Route GitHub domains through an independent policy group.
      boundary: template_all_subscription_nodes
    SPEEDTEST:
