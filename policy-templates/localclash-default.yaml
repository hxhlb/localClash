      boundary: template_all_subscription_nodes
  packs:
    - id: v2fly_dlc_category_ads_all
      type: geosite
      target: REJECT
      reason: Reject common advertising and tracking domains.
    - id: v2fly_dlc_private
      type: geosite
      target: direct
      reason: Keep private domains direct before broader proxy categories.
    - id: v2fly_dlc_category_public_tracker
      type: geosite
      target: direct
      reason: Keep public tracker domains direct for router-friendly download behavior.
    - id: v2fly_dlc_category_game_platforms_download
      type: geosite
      target: direct
      reason: Keep game platform download traffic direct.
    - id: v2fly_dlc_category_games@cn
      type: geosite
      target: direct
      reason: Keep China game service attributes direct.
    - id: v2fly_dlc_category_communication
      type: geosite
      target: COMMUNICATION
      reason: Route communication services through the communication policy group.
    - id: v2fly_dlc_category_social_media__cn
      type: geosite
      target: SOCIAL
      reason: Route non-China social media services through the social policy group.
    - id: v2fly_dlc_openai
      type: geosite
      target: CHATGPT
      reason: Route OpenAI domains through the ChatGPT policy group.
    - id: v2fly_dlc_category_ai__cn
      type: geosite
      target: AI
      reason: Route non-China AI categories through the AI policy group.
    - id: v2fly_dlc_github
      type: geosite
      target: GITHUB
      reason: Route GitHub domains through the GitHub policy group.
    - id: v2fly_dlc_category_speedtest
      type: geosite
      target: SPEEDTEST
      reason: Route speed test domains through the speed test policy group.
    - id: v2fly_dlc_steam
      type: geosite
