    - id: v2fly_dlc_tiktok
      type: geosite
      target: TIKTOK
      reason: Route TikTok domains through the TikTok policy group.
    - id: v2fly_dlc_netflix
      type: geosite
      target: NETFLIX
      reason: Route Netflix domains through the Netflix policy group.
    - id: v2fly_dlc_disney
      type: geosite
      target: DISNEY
      reason: Route Disney+ domains through the Disney policy group.
    - id: v2fly_dlc_hbo
      type: geosite
      target: HBO
      reason: Route HBO domains through the HBO policy group.
    - id: v2fly_dlc_primevideo
      type: geosite
      target: PRIME_VIDEO
      reason: Route Prime Video domains through the Prime Video policy group.
    - id: v2fly_dlc_category_emby
