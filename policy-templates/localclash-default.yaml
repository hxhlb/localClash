id: localclash-default
name: "localClash Default"
description: "Aethersailor-like default policy using v2fly-dlc GEOSITE packs for common categories."
default: true
config:
  version: 2
  policy_template: localclash-default
  proxy_groups:
    "🎯 手动选择":
      mode: manual
      match:
        type: name_regex
        pattern: ".*"
        min: 1
      reason: "面向 ACL4SSR 心智的手动出口选择，包含全部订阅节点。"
      boundary: all_subscription_nodes
    "⚡ 自动选择":
      mode: auto
      match:
        type: name_regex
        pattern: ".*"
        min: 1
      reason: "面向 ACL4SSR 心智的自动出口选择，包含全部订阅节点。"
      boundary: all_subscription_nodes
    "🇭🇰 香港节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(香港|HK|Hong.?Kong)"
      optional: true
      reason: "香港地区出口组，按节点名称自动筛选。"
      boundary: name_based_region_selector
    "🇺🇸 美国节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(美国|美國|US|United.?States|America)"
      optional: true
      reason: "美国地区出口组，按节点名称自动筛选。"
      boundary: name_based_region_selector
    "🇯🇵 日本节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(日本|JP|Japan)"
      optional: true
      reason: "日本地区出口组，按节点名称自动筛选。"
      boundary: name_based_region_selector
    "🇸🇬 新加坡节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(狮城|獅城|新加坡|SG|Singapore)"
      optional: true
      reason: "新加坡地区出口组，按节点名称自动筛选。"
      boundary: name_based_region_selector
    "🇹🇼 台湾节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(台湾|台灣|TW|Taiwan)"
      optional: true
      reason: "台湾地区出口组，按节点名称自动筛选。"
      boundary: name_based_region_selector
    "🇰🇷 韩国节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(韩国|韓國|KR|Korea)"
      optional: true
      reason: "韩国地区出口组，按节点名称自动筛选。"
      boundary: name_based_region_selector
    "🌐 全球直连":
      mode: direct
      reason: "面向 Dashboard 的 DIRECT 出口选择。"
      boundary: builtin_direct_exit
  policy_groups:
    "🧭 漏网之鱼":
      mode: manual
      exits:
        - "🎯 手动选择"
        - "⚡ 自动选择"
        - "🇭🇰 香港节点"
        - "🇺🇸 美国节点"
        - "🇯🇵 日本节点"
        - "🇸🇬 新加坡节点"
        - "🇹🇼 台湾节点"
        - "🇰🇷 韩国节点"
