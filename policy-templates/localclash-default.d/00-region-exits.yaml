---
id: default.region-exits.v1
description: Add direct and regional exit proxy groups.
config:
  version: 2
  proxy_groups:
    "\U0001F310 全球直连":
      mode: direct
      reason: 面向 Dashboard 的 DIRECT 出口选择。
      boundary: builtin_direct_exit
    "\U0001F1F9\U0001F1FC 台湾节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(台湾|台灣|TW|Taiwan)"
      optional: true
      reason: 台湾地区出口组，按节点名称自动筛选。
      boundary: name_based_region_selector
    "\U0001F1F8\U0001F1EC 新加坡节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(狮城|獅城|新加坡|SG|Singapore)"
      optional: true
      reason: 新加坡地区出口组，按节点名称自动筛选。
      boundary: name_based_region_selector
    "\U0001F1EF\U0001F1F5 日本节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(日本|JP|Japan)"
      optional: true
      reason: 日本地区出口组，按节点名称自动筛选。
      boundary: name_based_region_selector
    "\U0001F1FA\U0001F1F8 美国节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(美国|美國|US|United.?States|America)"
      optional: true
      reason: 美国地区出口组，按节点名称自动筛选。
      boundary: name_based_region_selector
    "\U0001F1F0\U0001F1F7 韩国节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(韩国|韓國|KR|Korea)"
      optional: true
      reason: 韩国地区出口组，按节点名称自动筛选。
      boundary: name_based_region_selector
    "\U0001F1ED\U0001F1F0 香港节点":
      mode: auto
      match:
        type: name_regex
        pattern: "(香港|HK|Hong.?Kong)"
      optional: true
      reason: 香港地区出口组，按节点名称自动筛选。
      boundary: name_based_region_selector
