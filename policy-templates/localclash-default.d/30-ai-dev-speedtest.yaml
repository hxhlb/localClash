---
id: default.ai-dev-speedtest.v1
description: Add ChatGPT, AI, GitHub, and speed-test business groups.
config:
  version: 2
  policy_groups:
    "\U0001F916 ChatGPT":
      mode: manual
      exits:
      - MANUAL
      - AUTO
      - "\U0001F1F8\U0001F1EC 新加坡节点"
      - "\U0001F1ED\U0001F1F0 香港节点"
      - "\U0001F1FA\U0001F1F8 美国节点"
      - "\U0001F1EF\U0001F1F5 日本节点"
      - "\U0001F1F9\U0001F1FC 台湾节点"
      - "\U0001F1F0\U0001F1F7 韩国节点"
      reason: OpenAI/ChatGPT 专属业务组；在规则顺序上优先于泛 AI 分类。
      boundary: business_to_exit_layer
    "\U0001F9E0 AI":
      mode: manual
      exits:
      - MANUAL
      - AUTO
      - "\U0001F1F8\U0001F1EC 新加坡节点"
      - "\U0001F1ED\U0001F1F0 香港节点"
      - "\U0001F1FA\U0001F1F8 美国节点"
      - "\U0001F1EF\U0001F1F5 日本节点"
      - "\U0001F1F9\U0001F1FC 台湾节点"
      - "\U0001F1F0\U0001F1F7 韩国节点"
      reason: 非中国泛 AI 服务分类；OpenAI/ChatGPT 已由专属业务组先匹配。
      boundary: business_to_exit_layer
    "\U0001F4BB GitHub":
      mode: manual
      exits:
      - MANUAL
      - AUTO
      - "\U0001F1ED\U0001F1F0 香港节点"
      - "\U0001F1FA\U0001F1F8 美国节点"
      - "\U0001F1EF\U0001F1F5 日本节点"
      - "\U0001F1F8\U0001F1EC 新加坡节点"
      - "\U0001F1F9\U0001F1FC 台湾节点"
      - "\U0001F1F0\U0001F1F7 韩国节点"
      - "\U0001F310 全球直连"
      reason: GitHub 可根据本地网络质量选择代理或直连。
      boundary: business_to_exit_layer
    "\U0001F4CA 测速服务":
      mode: manual
      exits:
      - "\U0001F310 全球直连"
      - MANUAL
      - AUTO
      - "\U0001F1ED\U0001F1F0 香港节点"
      - "\U0001F1FA\U0001F1F8 美国节点"
      - "\U0001F1EF\U0001F1F5 日本节点"
      - "\U0001F1F8\U0001F1EC 新加坡节点"
      - "\U0001F1F9\U0001F1FC 台湾节点"
      - "\U0001F1F0\U0001F1F7 韩国节点"
      reason: 测速服务默认优先直连，便于对比直连和代理出口质量。
      boundary: business_to_exit_layer
  packs:
  - id: v2fly_dlc_openai
    type: geosite
    target: "\U0001F916 ChatGPT"
    reason: Route OpenAI domains through ChatGPT selector.
  - id: v2fly_dlc_category_ai__cn
    type: geosite
    target: "\U0001F9E0 AI"
    reason: Route non-China AI service categories through AI selector.
  - id: v2fly_dlc_github
    type: geosite
    target: "\U0001F4BB GitHub"
    reason: Route GitHub domains through GitHub selector.
  - id: v2fly_dlc_category_speedtest
    type: geosite
    target: "\U0001F4CA 测速服务"
    reason: Route speed test domains through speed-test selector.
