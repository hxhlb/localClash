---
id: default.tail-fallback.v1
description: Add entertainment, ecommerce, fallback, and China direct tail routing.
config:
  version: 2
  policy_groups:
    "\U0001F39E 媒体":
      mode: manual
      exits:
      - MANUAL
      - AUTO
      - "\U0001F1ED\U0001F1F0 香港节点"
      - "\U0001F1FA\U0001F1F8 美国节点"
      - "\U0001F1EF\U0001F1F5 日本节点"
      - "\U0001F1F8\U0001F1EC 新加坡节点"
      - "\U0001F1F9\U0001F1FC 台湾节点"
      - "\U0001F1F0\U0001F1F7 韩国节点"
      reason: 综合媒体流量暴露常用流媒体地区。
      boundary: business_to_exit_layer
    "\U0001F6D2 电商":
      mode: manual
      exits:
      - MANUAL
      - AUTO
      - "\U0001F310 全球直连"
      - "\U0001F1ED\U0001F1F0 香港节点"
      - "\U0001F1FA\U0001F1F8 美国节点"
      - "\U0001F1EF\U0001F1F5 日本节点"
      - "\U0001F1F8\U0001F1EC 新加坡节点"
      - "\U0001F1F9\U0001F1FC 台湾节点"
      - "\U0001F1F0\U0001F1F7 韩国节点"
      reason: 电商服务允许直连或指定代理出口。
      boundary: business_to_exit_layer
    "\U0001F9ED 漏网之鱼":
      mode: manual
      exits:
      - MANUAL
      - AUTO
      - "\U0001F310 全球直连"
      - "\U0001F1ED\U0001F1F0 香港节点"
      - "\U0001F1FA\U0001F1F8 美国节点"
      - "\U0001F1EF\U0001F1F5 日本节点"
      - "\U0001F1F8\U0001F1EC 新加坡节点"
      - "\U0001F1F9\U0001F1FC 台湾节点"
      - "\U0001F1F0\U0001F1F7 韩国节点"
      reason: 非中国兜底流量，保留自动、手动、地区和直连出口。
      boundary: business_to_exit_layer
  packs:
  - id: v2fly_dlc_category_entertainment
    type: geosite
    target: "\U0001F39E 媒体"
    reason: Route entertainment and media categories through media selector.
  - id: v2fly_dlc_category_ecommerce
    type: geosite
    target: "\U0001F6D2 电商"
    reason: Route non-China ecommerce services through ecommerce selector.
  - id: v2fly_dlc_geolocation__cn
    type: geosite
    target: "\U0001F9ED 漏网之鱼"
    reason: Route non-China fallback through default business selector.
  - id: v2fly_dlc_cn
    type: geosite
    target: DIRECT
    reason: Keep China domains direct.
