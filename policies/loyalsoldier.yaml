# localClash base policy.
#
# Historical localClash builds used Loyalsoldier HTTP rule-providers here.
# The product default now keeps the high-volume domain classification in
# policy-templates/localclash-default.yaml through v2fly-dlc GEOSITE packs.
# This file only provides the base proxy groups and final fallback rules used by
# the renderer.

version: 1
name: localclash-base
description: Base policy for localClash generated configs; default category routing is supplied by policy templates.

rule_source:
  name: localClash/base
  repository: https://github.com/qoli/localClash
  base_url: https://example.invalid/localclash-unused
  primary_base_url: https://example.invalid/localclash-unused
  update_interval: 86400

groups:
  direct: DIRECT
  reject: REJECT
  proxy: PROXY
  auto: AUTO
  manual: MANUAL

provider_mapping:
  applications:
    path: applications.txt
    behavior: classical
    target: direct

modes:
  default: whitelist
  whitelist:
    description: v2fly-dlc policy templates classify known traffic; unmatched traffic remains DIRECT.
    fallback: direct
    rules:
      - domain: clash.razord.top
        target: direct
      - domain: yacd.haishan.me
        target: direct
      - geoip: LAN
        target: direct
      - geoip: CN
        target: direct
      - match: true
        target: direct
  blacklist:
    description: Compatibility mode with DIRECT fallback; add explicit proxy packs or custom rules for proxy routing.
    fallback: direct
    rules:
      - domain: clash.razord.top
        target: direct
      - domain: yacd.haishan.me
        target: direct
      - geoip: LAN
        target: direct
      - geoip: CN
        target: direct
      - match: true
        target: direct

local_overrides:
  direct:
    target: direct
    domains: []
  proxy:
    target: proxy
    domains: []
