description: Router transparent proxy based on Ronnie's redir-host-mix defaults.
mihomo:
  mixed-port: 7893
  redir-port: 7892
  tproxy-port: 7895
  port: 7890
  socks-port: 7891
  allow-lan: true
  bind-address: "*"
  mode: rule
  log-level: warning
  external-controller: 0.0.0.0:9090
  external-ui: ui/zashboard
  ipv6: true
  interface-name: pppoe-wan
  geodata-mode: true
  geodata-loader: standard
  tcp-concurrent: true
  unified-delay: true
  find-process-mode: "off"
  keep-alive-interval: 15
  keep-alive-idle: 600
  geox-url:
    mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
    geoip: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
    geosite: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
    asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb
  dns:
    enable: true
    ipv6: true
    enhanced-mode: redir-host
    listen: 0.0.0.0:7874
    respect-rules: true
    fake-ip-filter-mode: blacklist
    nameserver:
      - tcp://127.0.0.1:5335
    proxy-server-nameserver:
      - tcp://127.0.0.1:5335
    direct-nameserver:
      - tcp://127.0.0.1:5335
    default-nameserver:
      - tcp://127.0.0.1:5335
  tun:
    enable: true
    stack: mixed
    device: utun
    dns-hijack:
      - 127.0.0.1:53
    endpoint-independent-nat: true
    auto-route: false
    auto-detect-interface: false
    auto-redirect: false
    strict-route: false
    disable-icmp-forwarding: false
  sniffer:
    enable: true
    override-destination: true
    sniff:
      QUIC:
        ports:
          - 443
      TLS:
        ports:
          - 443
          - 8443
      HTTP:
        ports:
          - 80
          - 8080-8880
        override-destination: true
    force-domain:
      - +.netflix.com
      - +.nflxvideo.net
      - +.amazonaws.com
      - +.media.dssott.com
    skip-domain:
      - Mijia Cloud
      - dlg.io.mi.com
      - +.oray.com
      - +.sunlogin.net
      - +.push.apple.com
    force-dns-mapping: true
    parse-pure-ip: true
  profile:
    store-selected: true
  ntp:
    enable: true
    server: time.apple.com
    port: 123
    interval: 30
    write-to-system: true
deploy:
  lan-interface: br-lan
  wan-interface: pppoe-wan
  router-self-proxy: true
  dnsmasq-redirect: true
  ipv6-mode: 3
